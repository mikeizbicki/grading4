name: Integration Tests

on: [push, pull_request]

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Install package from PyPI
        run: pip install cmc-csci040-andrewvankomen==0.1.2

      - name: Run integration test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          chat <<'EOF'
          I am bob.
          What is my name?
          EOF