name: Integration Tests

on: [push, pull_request]

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install package from PyPI
        run: pip install cmc-csci040-andrewvankomen

      - name: Run basic chat test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          chat <<'EOF'
          I am bob.
          What is my name?
          EOF

      - name: Test ls tool in ebay scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        working-directory: test_projects/ebay_scraper
        run: |
          chat <<'EOF'
          /ls .
          what files are in this project?
          EOF

      - name: Test cat tool in markdown compiler
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        working-directory: test_projects/markdown_compiler
        run: |
          chat <<'EOF'
          /cat README.md
          what is this project about?
          EOF

      - name: Test grep tool in ebay scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        working-directory: test_projects/ebay_scraper
        run: |
          chat <<'EOF'
          /grep import *.py
          what libraries does this project use?
          EOF